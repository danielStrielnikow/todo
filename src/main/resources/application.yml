spring:
  application:
    name: todo
  
  datasource:
    url: ${env.DB_URL}
    driver-class-name: org.h2.Driver
    username: ${env.DB_USERNAME}
    password: ${env.DB_PASSWORD}
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /api-docs