spring:
  application:
    name: todo

  config:
    import: "optional:file:.env[.properties]"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
    
    management:
      endpoints:
        web:
          exposure:
            include: health, info
      endpoint:
        health:
          show-details: always
          
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true